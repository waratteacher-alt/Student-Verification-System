    <script type="text/babel" data-type="module">
        import React from "react";

        const firebaseConfig = {
            apiKey: "AIzaSyAA9PKaYeOdUGkIFX_6fT_m7EY5a4ChP-I",
            authDomain: "gradepro-52382.firebaseapp.com",
            projectId: "gradepro-52382",
            storageBucket: "gradepro-52382.firebasestorage.app",

        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'gradepro-v8-school'; // ใช้ ID เดิมเพื่อให้ข้อมูลเดิมแสดงผล

        const DEFAULT_MASTER = { school: 'โรงเรียนตัวอย่าง', theme: 'violet', courses: [], users: [] };
        const DEFAULT_GRADING = { '4': 80, '3.5': 75, '3': 70, '2.5': 65, '2': 60, '1.5': 55, '1': 50 };

        const THEMES = [
            { id: 'violet', name: 'ม่วง', hex: '#8b5cf6', rgb: '139, 92, 246', colors: { 50:'#f5f3ff', 100:'#ede9fe', 200:'#ddd6fe', 300:'#c4b5fd', 400:'#a78bfa', 500:'#8b5cf6', 600:'#7c3aed', 700:'#6d28d9', 800:'#5b21b6', 900:'#4c1d95' } },
            { id: 'blue', name: 'ฟ้า', hex: '#3b82f6', rgb: '59, 130, 246', colors: { 50:'#eff6ff', 100:'#dbeafe', 200:'#bfdbfe', 300:'#93c5fd', 400:'#60a5fa', 500:'#3b82f6', 600:'#2563eb', 700:'#1d4ed8', 800:'#1e40af', 900:'#1e3a8a' } },
            { id: 'emerald', name: 'เขียว', hex: '#10b981', rgb: '16, 185, 129', colors: { 50:'#ecfdf5', 100:'#d1fae5', 200:'#a7f3d0', 300:'#6ee7b7', 400:'#34d399', 500:'#10b981', 600:'#059669', 700:'#047857', 800:'#065f46', 900:'#064e3b' } }
        ];

        // --- แก้ไขปัญหาหน้าจอขาวด้วยการเติม Icon ให้ครบทุกตัวที่ใช้งาน ---
        const Icon = ({ name, size=20, className="", onClick, title }) => <i onClick={onClick} title={title} className={`ph ph-${name} ${className}`} style={{ fontSize: size, cursor: onClick ? 'pointer' : 'inherit' }}></i>;
        const Icons = { 
            Barcode: p=><Icon name="barcode" {...p}/>, User: p=><Icon name="user" {...p}/>, Lock: p=><Icon name="lock" {...p}/>, 
            LogOut: p=><Icon name="sign-out" {...p}/>, Edit: p=><Icon name="pencil-simple" {...p}/>, Trash: p=><Icon name="trash" {...p}/>, 
            Plus: p=><Icon name="plus" {...p}/>, Camera: p=><Icon name="camera" {...p}/>, Settings: p=><Icon name="gear" {...p}/>, 
            Alert: p=><Icon name="warning-circle" {...p}/>, X: p=><Icon name="x" {...p}/>, ChevronDown: p=><Icon name="caret-down" {...p}/>, 
            ChevronRight: p=><Icon name="caret-right" {...p}/>, ChevronLeft: p=><Icon name="caret-left" {...p}/>, Print: p=><Icon name="printer" {...p}/>, 
            Users: p=><Icon name="users" {...p}/>, FileText: p=><Icon name="file-text" {...p}/>, Upload: p=><Icon name="upload-simple" {...p}/>, 
            Eye: p=><Icon name="eye" {...p}/>, EyeOff: p=><Icon name="eye-slash" {...p}/>, Chart: p=><Icon name="chart-bar" {...p}/>, 
            Activity: p=><Icon name="activity" {...p}/>, Calculator: p=><Icon name="calculator" {...p}/>, Download: p=><Icon name="download-simple" {...p}/>, 
            Backspace: p=><Icon name="backspace" {...p}/>, Refresh: p=><Icon name="arrows-clockwise" {...p}/>, Database: p=><Icon name="database" {...p}/>, 
            Target: p=><Icon name="crosshair" {...p}/>, Shuffle: p=><Icon name="shuffle" {...p}/>, CheckCircle: p=><Icon name="check-circle" {...p}/>, 
            BookOpen: p=><Icon name="book-open" {...p}/>, Folder: p=><Icon name="folder" {...p}/>, LayoutGrid: p=><Icon name="squares-four" {...p}/>, 
            ShieldCheck: p=><Icon name="shield-check" {...p}/>, Desktop: p=><Icon name="desktop" {...p}/>, Sparkle: p=><Icon name="sparkles" {...p}/>, 
            IdentificationCard: p=><Icon name="identification-card" {...p}/>, Student: p=><Icon name="student" {...p}/>, Popup: p=><Icon name="browsers" {...p}/>,
            House: p=><Icon name="house" {...p}/>, Info: p=><Icon name="info" {...p}/>, ChalkboardTeacher: p=><Icon name="chalkboard-teacher" {...p}/>,
            Graph: p=><Icon name="chart-line-up" {...p}/>, Warning: p=><Icon name="warning-circle" {...p}/>, Note: p=><Icon name="note" {...p}/>,
            PaperPlaneRight: p=><Icon name="paper-plane-right" {...p}/>, UserCircle: p=><Icon name="user-circle" {...p}/>, Key: p=><Icon name="key" {...p}/>,
            Browser: p=><Icon name="browser" {...p}/>, Copy: p=><Icon name="copy" {...p}/>, Aperture: p=><Icon name="aperture" {...p}/>
        };

        const SECTION_COLORS = [
            { bg: 'bg-pink-300', border: 'border-pink-400', text: 'text-pink-900' },
            { bg: 'bg-sky-300', border: 'border-sky-400', text: 'text-sky-900' },
            { bg: 'bg-orange-300', border: 'border-orange-400', text: 'text-orange-900' },
            { bg: 'bg-purple-300', border: 'border-purple-400', text: 'text-purple-900' },
            { bg: 'bg-emerald-300', border: 'border-emerald-400', text: 'text-emerald-900' },
        ];
        const WHEEL_COLORS = ['#fca5a5', '#93c5fd', '#fcd34d', '#c4b5fd', '#86efac', '#f9a8d4', '#6ee7b7', '#fde047', '#f87171', '#60a5fa', '#fbbf24', '#a78bfa', '#4ade80', '#f472b6', '#34d399', '#facc15'];

        // --- Helper Functions ---
        const calculateTotalScoreCustom = (student, sectionsArray) => {
            let totalPercent = 0, hasPercent = false, totalManual = 0;
            (sectionsArray || []).forEach(s => { s.groups?.forEach(g => { g.columns?.forEach(c => {
                if (c.type === 'percent') {
                    let total = 0, max = 0;
                    g.columns.filter(cl => (cl.type === 'manual' || cl.type === 'check')).forEach(cl => {
                        let v = student.scores?.[cl.id]; let pVal = cl.type === 'check' ? (v ? parseFloat(cl.max || 0) : 0) : parseFloat(v || 0); total += pVal; max += parseFloat(cl.max || 0);
                    });
                    let val = '-'; if (c.type === 'sum') val = Math.ceil(total); if (c.type === 'percent') val = max === 0 ? 0 : Math.ceil((total / max) * (c.max || 100));
                    if (val !== '-') totalPercent += parseFloat(val); hasPercent = true;
                } else if (c.type === 'manual') { totalManual += parseFloat(student.scores?.[c.id] || 0); } else if (c.type === 'check') { totalManual += student.scores?.[c.id] ? parseFloat(c.max || 0) : 0; }
            }); }); });
            return Math.ceil(hasPercent ? totalPercent : totalManual);
        };
        const calculateGradeCustom = (score, grading) => { const g = grading || DEFAULT_GRADING; if(score >= g['4']) return 4; if(score >= g['3.5']) return 3.5; if(score >= g['3']) return 3; if(score >= g['2.5']) return 2.5; if(score >= g['2']) return 2; if(score >= g['1.5']) return 1.5; if(score >= g['1']) return 1; return 0; };

        // --- Modals ---
        function Modal({ isOpen, title, children, onClose, footer }) {
            if (!isOpen) return null;
            return ( <div className="fixed inset-0 z-[500] flex items-center justify-center p-4 print:hidden"><div className="absolute inset-0 bg-slate-900/50 backdrop-blur-sm" onClick={onClose}></div><div className="bg-white rounded-2xl shadow-2xl w-full max-w-md animate-scale overflow-hidden relative z-10 flex flex-col max-h-[90vh]"><div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50"><h3 className="font-bold text-lg">{title}</h3><button onClick={onClose} className="p-1"><Icons.X size={18}/></button></div><div className="p-6 overflow-y-auto">{children}</div>{footer && <div className="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-end gap-2">{footer}</div>}</div></div> );
        }

        function ScoreEntryModal({ isOpen, data, onClose, onSave, onNavigate }) {
            if (!isOpen || !data) return null;
            const { student, column, currentVal } = data;
            const [val, setVal] = React.useState(currentVal);
            React.useEffect(() => { setVal(data.currentVal); }, [data]);
            const handleSave = () => { onSave(val); };

            return (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden animate-scale ring-4 ring-white/20">
                        <div className="bg-slate-800 text-white p-6 flex justify-between items-start relative overflow-hidden">
                             <div className="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full -mr-10 -mt-10 pointer-events-none"></div>
                            <div className="relative z-10">
                                <div className="text-sm opacity-75 font-mono mb-1">{student.id} | ห้อง {student.room}</div>
                                <div className="text-2xl font-bold font-display leading-tight">{student.name}</div>
                            </div>
                            <button onClick={onClose} className="bg-white/10 hover:bg-white/20 p-2 rounded-full transition relative z-10"><Icons.X className="text-white"/></button>
                        </div>
                        <div className="p-8">
                            <div className="text-center mb-8">
                                <div className="text-sm font-bold text-slate-400 uppercase tracking-wide mb-3">{column.name}</div>
                                <div className="flex justify-center items-end gap-3">
                                    <input autoFocus type="number" className="text-6xl font-bold text-center text-primary-600 w-40 border-b-4 border-primary-200 focus:border-primary-600 outline-none bg-transparent transition-colors font-mono" value={val} placeholder="-" onChange={e => setVal(e.target.value)} onKeyDown={e => { if(e.key === 'Enter') { handleSave(); onNavigate(1); } }} />
                                    <span className="text-2xl text-slate-300 font-bold mb-3 font-mono">/{column.max}</span>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                 <button onClick={() => { handleSave(); onNavigate(-1); }} className="py-4 rounded-2xl bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold flex items-center justify-center gap-2 transition active:scale-95"><Icons.ChevronLeft/> คนก่อน</button>
                                 <button onClick={() => { handleSave(); onNavigate(1); }} className="py-4 rounded-2xl bg-primary-600 hover:bg-primary-700 text-white font-bold flex items-center justify-center gap-2 shadow-lg shadow-primary-200 transition active:scale-95">ถัดไป <Icons.ChevronRight/></button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function ScannerScoreModal({ isOpen, student, sections, onClose, updateStudent, calculateTotalScore, calculateGrade }) {
            if (!isOpen || !student) return null;
            const [localScores, setLocalScores] = React.useState(student.scores || {});
            const [aiFeedback, setAiFeedback] = React.useState(student.note || '');
            const [aiLoading, setAiLoading] = React.useState(false);

            React.useEffect(() => {
                setLocalScores(student.scores || {});
                setAiFeedback(student.note || '');
            }, [student]);

            const handleScoreChange = (col, val) => {
                if (val !== '' && (!isNaN(val) && parseFloat(val) > parseFloat(col.max))) return;
                const newScores = { ...localScores, [col.id]: val };
                setLocalScores(newScores);
                updateStudent({ ...student, scores: newScores });
            };

            const handleGenerateAIFeedback = () => {
                setAiLoading(true);
                setTimeout(() => {
                    const total = calculateTotalScore(student, true);
                    const grade = calculateGrade(total);
                    let comment = "";
                    if (grade >= 3.5) comment = `นักเรียนมีผลการเรียนดีเยี่ยม (${total} คะแนน) มีความรับผิดชอบสูงมากและส่งงานตรงเวลาอย่างสม่ำเสมอ`;
                    else if (grade >= 2) comment = `นักเรียนมีผลการเรียนระดับปานกลาง (${total} คะแนน) ส่งงานส่วนใหญ่ครบถ้วน แต่อาจต้องพัฒนาเพิ่มเติม`;
                    else comment = `นักเรียนต้องการการดูแลและติดตามอย่างใกล้ชิด คะแนนรวมในปัจจุบัน (${total} คะแนน) ยังค่อนข้างต่ำและมีงานค้าง`;
                    setAiFeedback(comment);
                    updateStudent({ ...student, note: comment });
                    setAiLoading(false);
                }, 800);
            };

            const gradableCols = [];
            sections.forEach(sec => {
                if (sec.published === false) return;
                sec.groups?.forEach(g => {
                    if (g.published === false) return;
                    g.columns?.forEach(c => {
                        if (c.published !== false && (c.type === 'manual' || c.type === 'check')) gradableCols.push({ secTitle: sec.title, col: c });
                    });
                });
            });

            const missingCount = gradableCols.filter(({ col }) => col.required !== false && (localScores[col.id] === undefined || localScores[col.id] === '')).length;

            return (
                <div className="fixed inset-0 z-[250] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-2xl overflow-hidden animate-scale flex flex-col max-h-[90vh]">
                        <div className="bg-gradient-to-r from-primary-600 to-primary-800 p-6 text-white flex justify-between items-start relative shrink-0">
                            <div>
                                <div className="text-primary-100 text-sm font-mono mb-1 flex items-center gap-2"><Icons.Barcode size={16}/> รหัส {student.id}</div>
                                <h2 className="text-2xl font-bold font-display">{student.name}</h2>
                                <p className="text-primary-100 text-sm mt-1">ห้อง {student.room} เลขที่ {student.no}</p>
                            </div>

        function VirtualNumpad({ isOpen, onInput, onClose }) {
            const { useState, useRef, useEffect } = React;
            if (!isOpen) return null;
            const [pos, setPos] = useState({ x: window.innerWidth - 280, y: 100 });
            const [dragging, setDragging] = useState(false);
            const offset = useRef({ x: 0, y: 0 });

            useEffect(() => {
                const move = (e) => { if (dragging) setPos({ x: e.clientX - offset.current.x, y: e.clientY - offset.current.y }); };
                const up = () => setDragging(false);
                window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
                return () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
            }, [dragging]);

            return (
                <div className="fixed z-[150] bg-white rounded-2xl shadow-2xl border border-slate-200 w-64 overflow-hidden animate-scale virtual-numpad" style={{ left: pos.x, top: pos.y }}>
                    <div className="bg-slate-100 p-2 cursor-move flex justify-between items-center border-b border-slate-200" onMouseDown={e => { setDragging(true); offset.current = { x: e.clientX - pos.x, y: e.clientY - pos.y }; }}>
                        <span className="text-xs font-bold text-slate-500 uppercase tracking-wide flex items-center gap-1"><Icons.Calculator size={12}/> Keypad</span>
                        <button onClick={onClose}><Icons.X size={14} className="text-slate-400 hover:text-red-500"/></button>
                    </div>
                    <div className="grid grid-cols-3 gap-2 p-3 bg-slate-50">
                        {[1, 2, 3, 4, 5, 6, 7, 8, 9, '.', 0].map(k => <button key={k} onClick={() => onInput(k)} className="h-12 bg-white rounded-lg shadow-sm border border-slate-200 font-bold text-xl text-slate-700 active:scale-95 transition hover:bg-primary-50 hover:border-primary-200">{k}</button>)}
                        <button onClick={() => onInput('Del')} className="h-12 bg-red-50 rounded-lg shadow-sm border border-red-100 font-bold text-red-500 active:scale-95 transition flex items-center justify-center"><Icons.Backspace size={20}/></button>
                    </div>
                </div>
            );
        }

                                                                                        <div key={col.id} className="bg-slate-50 border border-slate-200 rounded-xl p-3 w-40 relative group">
                                                                                            <input className="bg-transparent text-sm font-bold text-slate-800 outline-none w-full border-b border-slate-300 pb-1 mb-2" value={col.name} placeholder="ชื่อช่องประเมิน" onChange={e => { const newSecs = [...sections]; newSecs[sIdx].groups[gIdx].columns[cIdx].name = e.target.value; setSections(newSecs); saveCourseConfigData(newSecs, null, null, null); }} />
                                                                                            <div className="flex items-center gap-2 mb-2"><span className="text-[10px] font-bold text-slate-400">Max:</span><input className="w-12 text-center text-sm font-bold outline-none border rounded" value={col.max} onChange={e => { const newSecs = [...sections]; newSecs[sIdx].groups[gIdx].columns[cIdx].max = e.target.value; setSections(newSecs); saveCourseConfigData(newSecs, null, null, null); }} /></div>
                                                                                            <button onClick={() => { const newSecs = [...sections]; const types = ['manual', 'check', 'sum', 'percent']; newSecs[sIdx].groups[gIdx].columns[cIdx].type = types[(types.indexOf(col.type) + 1) % types.length]; setSections(newSecs); saveCourseConfigData(newSecs, null, null, null); }} className="text-[10px] w-full font-bold px-2 py-1 rounded bg-white border shadow-sm">ชนิด: {col.type}</button>
                                                                                            <button onClick={() => { const newSecs = [...sections]; newSecs[sIdx].groups[gIdx].columns.splice(cIdx, 1); setSections(newSecs); saveCourseConfigData(newSecs, null, null, null); }} className="absolute -top-2 -right-2 bg-red-100 text-red-500 rounded-full p-1 opacity-0 group-hover:opacity-100"><Icons.X size={12}/></button>
                                                                                        </div>
                                                                                    ))}
                                                                                </div>
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                </div>
                                                            );})}
                                                        </div>
                                                    </div>
                                                )}
                                                {settingSubTab === 'data' && (
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                        <div className="border border-slate-200 rounded-3xl p-6 bg-slate-50"><h4 className="font-bold text-lg mb-2">สำรองข้อมูล (Backup)</h4><button onClick={handleExportCSV} className="w-full py-3 mb-2 bg-white border border-slate-200 rounded-xl font-bold">Export .CSV</button><button onClick={handleBackup} className="w-full py-3 bg-slate-800 text-white rounded-xl font-bold">Backup .JSON</button></div>
                                                        <div className="border border-red-200 rounded-3xl p-6 bg-red-50"><h4 className="font-bold text-lg text-red-700 mb-2">ล้างข้อมูล (Clear Data)</h4><button onClick={handleClearData} className="w-full py-3 bg-white border border-red-300 text-red-600 rounded-xl font-bold">ลบข้อมูลนักเรียนและคะแนนทั้งหมด</button></div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                </div>
                            </main>
                        </div>
                    )}

                    {/* --- STUDENT WORKSPACE --- */}
                    {view === 'student_course_view' && studentViewData && (
                        <div className="min-h-screen bg-slate-50 pb-10">
                            <TopNav />
                            <main className="max-w-4xl mx-auto mt-8 px-4 animate-slide-up">
                                <button onClick={() => { setView('dashboard'); setSelectedStudentCourse(null); setStudentViewData(null); setActiveCourseId(''); }} className="mb-4 text-slate-500 hover:text-primary-600 flex items-center gap-1 text-sm font-bold transition px-3 py-1.5 bg-white border border-slate-200 rounded-lg shadow-sm">
                                    <Icons.ChevronLeft size={16}/> กลับไปหน้ารายวิชา
                                </button>
                                <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 mb-6">
                                    <div className="flex items-center gap-4 mb-4 pb-4 border-b border-slate-100">
                                        <div className="w-16 h-16 bg-primary-100 rounded-full flex items-center justify-center text-primary-600 shadow-inner"><Icons.User size={32}/></div>
                                        <div><h3 className="text-2xl font-bold text-slate-800">{studentViewData.name}</h3><p className="text-slate-500 text-sm">วิชา: {selectedStudentCourse.course.name} ({selectedStudentCourse.course.code})</p></div>
                                    </div>
                                    <div className="bg-slate-800 text-white p-6 rounded-2xl flex justify-between items-center mb-6">
                                        <div><div className="text-sm opacity-80">คะแนนรวม</div><div className="text-4xl font-bold">{calculateTotalScore(activeStudentData)} <span className="text-base text-slate-400">/ 100</span></div></div>
                                        <div className="text-right"><div className="text-sm opacity-80">เกรด</div><div className="text-5xl font-display font-bold text-yellow-400">{courseConfig.showGrade ? calculateGrade(calculateTotalScore(activeStudentData)) : <span className="text-xl">รอประกาศ</span>}</div></div>
                                    </div>
                                    <table className="w-full text-left border">
                                        <thead className="bg-slate-100"><tr><th className="p-3">รายการประเมิน</th><th className="p-3 w-20 text-center">เต็ม</th><th className="p-3 w-24 text-center">ได้</th></tr></thead>
                                        <tbody className="divide-y">
                                            {sections.map(sec=>sec.published!==false && (
                                                <React.Fragment key={sec.id}>
                                                    <tr className="bg-slate-50"><td colSpan="3" className="p-3 font-bold text-primary-700 text-xs">{sec.title}</td></tr>
                                                    {sec.groups?.map(g=>g.published!==false && g.columns?.map(col=>{
                                                        if(col.published===false) return null;
                                                        const val = col.type === 'manual' || col.type === 'check' ? getScore(activeStudentData, col.id) : calculateAutoScore(activeStudentData, g, col);
                                                        return <tr key={col.id}><td className="p-3 pl-6">{col.name}</td><td className="p-3 text-center">{col.max}</td><td className="p-3 text-center font-bold">{col.type==='check' ? (val?'✅':'❌') : (val||'-')}</td></tr>;
                                                    }))}
                                                </React.Fragment>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </main>
                        </div>
                    )}

                    {/* MODALS */}
                    <Modal isOpen={ocrModal} title="สแกนใบลงคะแนนด้วย AI (OCR)" onClose={() => setOcrModal(false)}>
                        <div className="text-center p-6 border-2 border-dashed rounded-xl bg-slate-50">
                            {ocrLoading ? <div className="animate-pulse font-bold text-primary-600">{ocrProgress}</div> : <label className="cursor-pointer font-bold text-primary-600">คลิกอัปโหลดรูปภาพ <input type="file" className="hidden" onChange={handleSmartOcrImage}/></label>}
                        </div>
                    </Modal>

                    <Modal isOpen={idCardModal} title="สร้างบัตรนักเรียน" onClose={() => setIdCardModal(false)}>
                        <div className="space-y-4">
                            <select className="w-full p-2 border rounded-xl" value={idCardCourseId} onChange={e=>setIdCardCourseId(e.target.value)}><option value="" disabled hidden>เลือกรายวิชา</option>{visibleCourses.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select>
                            <button onClick={()=>handlePrintIDCard(idCardStudents)} disabled={idCardStudents.length===0} className="w-full py-3 bg-slate-800 text-white rounded-xl font-bold disabled:bg-slate-300"><Icons.Print className="inline mr-2"/> พิมพ์บัตรทั้งหมด</button>
                        </div>
                    </Modal>

                    <Modal isOpen={modal?.type === 'course_edit'} title="จัดการรายวิชา" onClose={() => setModal(null)} footer={<button onClick={() => { if(!modal.data.code || !modal.data.name) return showToast('กรอกรหัสและชื่อวิชา', 'error'); let newC = [...(masterData.courses||[])]; const idx = newC.findIndex(c=>c.id===modal.data.id); if(idx>=0) newC[idx]=modal.data; else newC.push(modal.data); setMasterData({...masterData, courses:newC}); setDoc(doc(db,'artifacts',appId,'public','data','master','info'), {courses:newC}, {merge:true}); setModal(null); showToast('บันทึกวิชาเรียบร้อย', 'success'); }} className="px-4 py-2 bg-primary-600 text-white rounded-xl font-bold">บันทึก</button>}> 
                        <div className="space-y-3">
                            <input className="w-full p-2 border rounded-xl" placeholder="รหัสวิชา" value={modal?.data?.code||''} onChange={e=>setModal({...modal, data:{...modal.data, code:e.target.value}})} />
                            <input className="w-full p-2 border rounded-xl" placeholder="ชื่อรายวิชา" value={modal?.data?.name||''} onChange={e=>setModal({...modal, data:{...modal.data, name:e.target.value}})} />
                            <div className="flex gap-2"><input className="w-1/2 p-2 border rounded-xl" placeholder="เทอม" type="number" value={modal?.data?.semester||''} onChange={e=>setModal({...modal, data:{...modal.data, semester:e.target.value}})} /><input className="w-1/2 p-2 border rounded-xl" placeholder="ปีการศึกษา" type="number" value={modal?.data?.year||''} onChange={e=>setModal({...modal, data:{...modal.data, year:e.target.value}})} /></div>
                            {loggedUser?.role === 'admin' && <select className="w-full p-2 border rounded-xl" value={modal?.data?.teacherId||''} onChange={e=>setModal({...modal, data:{...modal.data, teacherId:e.target.value}})}><option value="">-- เลือกผู้สอน --</option>{masterData.users?.filter(u=>u.role==='teacher').map(t=><option key={t.id} value={t.id}>{t.name}</option>)}</select>}
                        </div> 
                    </Modal>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
