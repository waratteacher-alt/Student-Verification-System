p: p => <Icon name="desktop" {...p} />, Copy: p => <Icon name="copy" {...p} />, PaperPlaneRight: p => <Icon name="paper-plane-right" {...p} />, UserCircle: p => <Icon name="user-circle" {...p} />, IdentificationCard: p => <Icon name="identification-card" {...p} />, Key: p => <Icon name="key" {...p} />, Sparkle: p => <Icon name="sparkles" {...p} />, ChalkboardTeacher: p => <Icon name="chalkboard-teacher" {...p} />, Student: p => <Icon name="student" {...p} />, House: p => <Icon name="house" {...p} />, Graph: p => <Icon name="chart-line-up" {...p} />, Warning: p => <Icon name="warning-circle" {...p}/>, Info: p => <Icon name="info" {...p}/>
        };

        const SECTION_COLORS = [
            { bg: 'bg-pink-300', border: 'border-pink-400', text: 'text-pink-900' },
            { bg: 'bg-sky-300', border: 'border-sky-400', text: 'text-sky-900' },
            { bg: 'bg-orange-300', border: 'border-orange-400', text: 'text-orange-900' },
            { bg: 'bg-purple-300', border: 'border-purple-400', text: 'text-purple-900' },
            { bg: 'bg-emerald-300', border: 'border-emerald-400', text: 'text-emerald-900' },
        ];
        const WHEEL_COLORS = ['#fca5a5', '#93c5fd', '#fcd34d', '#c4b5fd', '#86efac', '#f9a8d4', '#6ee7b7', '#fde047', '#f87171', '#60a5fa', '#fbbf24', '#a78bfa', '#4ade80', '#f472b6', '#34d399', '#facc15'];

        // --- Helper Functions ---
        const calculateTotalScoreCustom = (student, sectionsArray) => {
            let totalPercent = 0, hasPercent = false, totalManual = 0;
            (sectionsArray || []).forEach(s => {
                 s.groups?.forEach(g => {
                    g.columns?.forEach(c => {
                         if (c.type === 'percent') {
                             let total = 0, max = 0;
                             g.columns.filter(cl => (cl.type === 'manual' || cl.type === 'check')).forEach(cl => {
                                 let v = student.scores?.[cl.id];
                                 let pVal = cl.type === 'check' ? (v ? parseFloat(cl.max || 0) : 0) : parseFloat(v || 0);
                                 total += pVal; max += parseFloat(cl.max || 0);
                             });
                             let val = '-';
                             if (c.type === 'sum') val = Math.ceil(total);
                             if (c.type === 'percent') val = max === 0 ? 0 : Math.ceil((total / max) * (c.max || 100));
                             if (val !== '-') totalPercent += parseFloat(val);
                             hasPercent = true;
                         } else if (c.type === 'manual') {
                             totalManual += parseFloat(student.scores?.[c.id] || 0);
                         } else if (c.type === 'check') {
                             totalManual += student.scores?.[c.id] ? parseFloat(c.max || 0) : 0;
                         }
                    });
                 });
            });
            return Math.ceil(hasPercent ? totalPercent : totalManual);
        };

        const calculateGradeCustom = (score, grading) => {
            const g = grading || DEFAULT_GRADING;
            if(score >= g['4']) return 4; if(score >= g['3.5']) return 3.5;
            if(score >= g['3']) return 3; if(score >= g['2.5']) return 2.5;
            if(score >= g['2']) return 2; if(score >= g['1.5']) return 1.5;
            if(score >= g['1']) return 1; return 0;
        };

                                    <span className="text-2xl text-slate-300 font-bold mb-3 font-mono">/{column.max}</span>
                                </div>
                            </div>

        function ScannerScoreModal({ isOpen, student, sections, onClose, updateStudent, calculateTotalScore, calculateGrade }) {
            if (!isOpen || !student) return null;
            const [localScores, setLocalScores] = React.useState(student.scores || {});
            const [aiFeedback, setAiFeedback] = React.useState(student.note || '');
            const [aiLoading, setAiLoading] = React.useState(false);

            React.useEffect(() => {
                setLocalScores(student.scores || {});
                setAiFeedback(student.note || '');
            }, [student]);

            const handleScoreChange = (col, val) => {
                if (val !== '' && (!isNaN(val) && parseFloat(val) > parseFloat(col.max))) return;
                const newScores = { ...localScores, [col.id]: val };
                setLocalScores(newScores);
                updateStudent({ ...student, scores: newScores });
            };

            const handleGenerateAIFeedback = () => {
                setAiLoading(true);
                setTimeout(() => {
                    const total = calculateTotalScore(student, true);
                    const grade = calculateGrade(total);
                    let comment = "";

                    else comment = `นักเรียนต้องการการดูแลและติดตามอย่างใกล้ชิด คะแนนรวมในปัจจุบัน (${total} คะแนน) ยังค่อนข้างต่ำและมีงานค้าง`;

                        <div className="p-6 overflow-y-auto flex-1 bg-slate-50 space-y-6">

                                    <button onClick={handleGenerateAIFeedback} disabled={aiLoading} className="bg-primary-600 text-white px-3 py-1.5 rounded-xl text-xs font-bold shadow-sm hover:bg-primary-700 transition flex items-center gap-1">

        function VirtualNumpad({ isOpen, onInput, onClose }) {
            const { useState, useRef, useEffect } = React;
            if (!isOpen) return null;
            const [pos, setPos] = useState({ x: window.innerWidth - 280, y: 100 });
            const [dragging, setDragging] = useState(false);
            const offset = useRef({ x: 0, y: 0 });

            useEffect(() => {
                const move = (e) => { if (dragging) setPos({ x: e.clientX - offset.current.x, y: e.clientY - offset.current.y }); };
                const up = () => setDragging(false);
                window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
                return () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
            }, [dragging]);

            return (
                <div className="fixed z-[150] bg-white rounded-2xl shadow-2xl border border-slate-200 w-64 overflow-hidden animate-scale virtual-numpad" style={{ left: pos.x, top: pos.y }}>
                    <div className="bg-slate-100 p-2 cursor-move flex justify-between items-center border-b border-slate-200" onMouseDown={e => { setDragging(true); offset.current = { x: e.clientX - pos.x, y: e.clientY - pos.y }; }}>
                        <span className="text-xs font-bold text-slate-500 uppercase tracking-wide flex items-center gap-1"><Icons.Calculator size={12}/> Keypad</span>
                        <button onClick={onClose}><Icons.X size={14} className="text-slate-400 hover:text-red-500"/></button>
                    </div>
                    <div className="grid grid-cols-3 gap-2 p-3 bg-slate-50">
                        {[1, 2, 3, 4, 5, 6, 7, 8, 9, '.', 0].map(k => <button key={k} onClick={() => onInput(k)} className="h-12 bg-white rounded-lg shadow-sm border border-slate-200 font-bold text-xl text-slate-700 active:scale-95 transition hover:bg-primary-50 hover:border-primary-200">{k}</button>)}
                        <button onClick={() => onInput('Del')} className="h-12 bg-red-50 rounded-lg shadow-sm border border-red-100 font-bold text-red-500 active:scale-95 transition flex items-center justify-center"><Icons.Backspace size={20}/></button>
                    </div>
                </div>
            );
        }

        function App() {
            const { useState, useEffect, useRef, useMemo } = React;
            
            // --- Global States ---
            const [isOnline, setIsOnline] = useState(navigator.onLine);
            const [loading, setLoading] = useState(true);

            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');

            const [activeCourseId, setActiveCourseId] = useState('');
            const [students, setStudents] = useState([]);
            const [sections, setSections] = useState([]);
            const [courseConfig, setCourseConfig] = useState({ grading: DEFAULT_GRADING, drawnIds: [], showGrade: false });
            
            const [presence, setPresence] = useState([]);
            const [accessLogs, setAccessLogs] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedRoom, setSelectedRoom] = useState('All');
            
            // For Student/Parent Role View
            const [foundStudentCourses, setFoundStudentCourses] = useState([]);
            const [selectedStudentCourse, setSelectedStudentCourse] = useState(null);
            const [studentViewData, setStudentViewData] = useState(null);
            
            const [homeroomData, setHomeroomData] = useState({ students: [], courses: [] });
            const [isHomeroomLoading, setIsHomeroomLoading] = useState(false);

            const [teacherTab, setTeacherTab] = useState('overview');
            const [settingSubTab, setSettingSubTab] = useState('general'); 
            const [isImporting, setIsImporting] = useState(false);
            const [numpadOpen, setNumpadOpen] = useState(false);
            const [isPopupMode, setIsPopupMode] = useState(false);
            
            const [attendanceDate, setAttendanceDate] = useState(new Date().toISOString().split('T')[0]);
            const [activeScoreEntry, setActiveScoreEntry] = useState(null);
            const [scannerModalData, setScannerModalData] = useState(null);
            const barcodeBuffer = useRef('');
            const barcodeTimeout = useRef(null);
            const restoreInputRef = useRef(null);
            const importFileInputRef = useRef(null);

            const [isSimulateMode, setIsSimulateMode] = useState(false);
            const [simulatedScores, setSimulatedScores] = useState({});

            const [randomRoom, setRandomRoom] = useState('');
            const [isSpinning, setIsSpinning] = useState(false);
            const [isZooming, setIsZooming] = useState(false);
            const [wheelRotation, setWheelRotation] = useState(0);
            const [randomWinner, setRandomWinner] = useState(null);
            const [winnerModal, setWinnerModal] = useState(null);
            const [spinDuration, setSpinDuration] = useState(5);
            
            // State สำหรับระบบบัตรนักเรียน
            const [printMode, setPrintMode] = useState(''); 
            const [idCardModal, setIdCardModal] = useState(false);

            const [idCardCourseId, setIdCardCourseId] = useState(''); 
            const [idCardStudents, setIdCardStudents] = useState([]); 
            const [idCardRoom, setIdCardRoom] = useState('All');
            const [idCardSearch, setIdCardSearch] = useState('');
            const [cardStyle, setCardStyle] = useState('classic'); 

            // State สำหรับระบบ AI (OCR และ Smart Grouping)
            const [ocrModal, setOcrModal] = useState(false);
            const [ocrLoading, setOcrLoading] = useState(false);
            const [ocrProgress, setOcrProgress] = useState('');
            const [groupSize, setGroupSize] = useState(4);
            const [smartGroups, setGeneratedGroups] = useState([]);

            const showToast = (msg, type='info') => { setToast({msg, type}); setTimeout(() => setToast(null), 3000); };

            // --- Effects ---
            useEffect(() => {
                const handleOnline = () => setIsOnline(true);
                const handleOffline = () => setIsOnline(false);
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                return () => { window.removeEventListener('online', handleOnline); window.removeEventListener('offline', handleOffline); };
            }, []);

            useEffect(() => {
                const init = async () => {
                    try { await signInAnonymously(auth); } catch (e) { console.error("Auth Failed", e); }
                };
                init();
                return onAuthStateChanged(auth, (u) => { setUser(u); });
            }, []);

            // ดึง Master Data
            useEffect(() => {
                if (!user) return;
                const unsubMaster = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'master', 'info'), (d) => {
                    if (d.exists()) {
                        setMasterData(d.data());

                        setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'master', 'info'), DEFAULT_MASTER);

            // อัปเดตธีมสี

            // โหลดข้อมูลการล็อกอินจาก LocalStorage

            // ดึงข้อมูลรายวิชา (เมื่อเป็น Teacher และกดเข้าวิชา)
            useEffect(() => {
                if (!user || !activeCourseId || view !== 'course_workspace') return;
                
                setStudents([]); setSections([]);
                const unsubConfig = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', `config_${activeCourseId}`, 'main'), (d) => {
                    if (d.exists()) {

                });
                
                const unsubStudents = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', `students_${activeCourseId}`), (snap) => {
                    const list = [];

                const unsubLogs = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', `logs_${activeCourseId}`), (snap) => {
                    const logs = [];
                    snap.forEach(doc => logs.push(doc.data()));
                    setAccessLogs(logs.sort((a,b) => b.time - a.time).slice(0, 50));

                return () => { unsubConfig(); unsubStudents(); unsubLogs(); };
            }, [user, activeCourseId, view]);

            // ดึงข้อมูลห้องประจำชั้น
            useEffect(() => {
                if (view !== 'homeroom_workspace' || !loggedUser?.homeroom || !masterData.courses) return;
                
                const fetchHomeroomData = async () => {
                    setIsHomeroomLoading(true);
                    const hrRoom = loggedUser.homeroom;
                    const sMap = {}; const cList = []; 
                    try {
                        for (const c of masterData.courses) {
                            const cSnap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', `config_${c.id}`, 'main'));
                            const config = cSnap.exists() ? cSnap.data() : { sections: [], grading: DEFAULT_GRADING, showGrade: false };
                            const sSnap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', `students_${c.id}`));
                            let hasStudentInRoom = false;
                            sSnap.forEach(dSnap => {
                                const s = dSnap.data();
                                if (s.room === hrRoom) {
                                    hasStudentInRoom = true;
                                    if (!sMap[s.id]) sMap[s.id] = { id: s.id, name: s.name, no: s.no, scores: {}, grades: {} };
                                    const total = calculateTotalScoreCustom(s, config.sections);
                                    const grade = calculateGradeCustom(total, config.grading);
                                    sMap[s.id].scores[c.id] = total;
                                    sMap[s.id].grades[c.id] = config.showGrade ? grade : 'รอประกาศ';
                                }
                            });
                            if (hasStudentInRoom) cList.push(c);
                        }
                        setHomeroomData({ students: Object.values(sMap).sort((a,b) => (parseInt(a.no)||0) - (parseInt(b.no)||0)), courses: cList });
                    } catch (e) {
                        console.error("Error fetching homeroom data:", e);
                        showToast('เกิดข้อผิดพลาดในการโหลดข้อมูลห้องเรียน', 'error');
                    }
                    setIsHomeroomLoading(false);
                };
                fetchHomeroomData();
            }, [view, loggedUser, masterData.courses]);

            // Presence (Online Status)
            useEffect(() => {
                if(!user || !activeCourseId) return;
                const presenceRef = doc(db, 'artifacts', appId, 'public', 'data', `presence_${activeCourseId}`, user.uid);
                const heartbeat = setInterval(() => {
                    setDoc(presenceRef, { lastSeen: Date.now(), role: loggedUser?.role || 'guest', viewing: studentViewData?.name || null }, { merge: true });
                }, 10000);
                
                let unsubPresence = () => {};
                if(loggedUser?.role === 'teacher' && view === 'course_workspace') {
                    unsubPresence = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', `presence_${activeCourseId}`), (snap) => {
                        const active = []; const now = Date.now();
                        snap.forEach(d => { if (now - d.data().lastSeen < 60000) active.push(d.data()); });
                        setPresence(active);
                    });
                }
                return () => { clearInterval(heartbeat); unsubPresence(); };
            }, [user, view, studentViewData, activeCourseId, loggedUser]);

            // Scanner Barcode Logic
            useEffect(() => {
                if (view !== 'course_workspace' || loggedUser?.role !== 'teacher') return; 

                const handleGlobalKeyDown = (e) => {
                    if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
                    if (e.key.length === 1) {
                        barcodeBuffer.current += e.key;
                        clearTimeout(barcodeTimeout.current);
                        barcodeTimeout.current = setTimeout(() => { barcodeBuffer.current = ''; }, 50); 
                    }
                    if (e.key === 'Enter' && barcodeBuffer.current.length > 2) {
                        const scannedId = barcodeBuffer.current;
                        barcodeBuffer.current = ''; e.preventDefault(); 
                        const foundStudent = students.find(s => s.id === scannedId);
                        if (foundStudent) {
                            if (teacherTab === 'attendance') {
                                const newAttendance = { ...(foundStudent.attendance || {}), [attendanceDate]: 'present' };

                                setStudents(prev => prev.map(p => p.id === updatedStudent.id ? updatedStudent : p));
                                updateStudent(updatedStudent);
                                showToast(`เช็คชื่อ (มา): ${foundStudent.name}`, 'success');
                            } else {
                                setScannerModalData(foundStudent);
                                showToast(`สแกนพบ: ${foundStudent.name}`, 'success');

            // --- Authentication Functions ---
            const logSystemActivity = async (userObj, action) => {

                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'audit_logs'), {

                    });
                } catch (e) { console.error("Logging failed", e); }

            const handleLogin = async () => {
                if (!username || !password) return showToast('กรุณากรอกข้อมูลให้ครบถ้วน', 'error');

                const users = masterData.users || [];
                const userFound = users.find(u => u.username === username);

                if (userFound) {
                    // Check 1: Normal Role Login
                    if (userFound.password === password) {
                        setLoggedUser(userFound);
                        localStorage.setItem('regProUser', JSON.stringify(userFound));
                        showToast(`ยินดีต้อนรับเข้าสู่ระบบ, ${userFound.name}`, 'success');
                        logSystemActivity(userFound, 'LOGIN_SUCCESS');
                        setView('dashboard');
                    } 
                    // Check 2: Parent Login
                    else if (userFound.role === 'student' && (userFound.phone === password || userFound.nationalId === password)) {
                        const parentUser = { id: 'p_' + userFound.id, username: 'parent_' + userFound.username, role: 'parent', name: `ผู้ปกครองของ ${userFound.name}`, childData: userFound };
                        setLoggedUser(parentUser);
                        localStorage.setItem('regProUser', JSON.stringify(parentUser));
                        showToast(`ยินดีต้อนรับเข้าสู่ระบบพอร์ทัลผู้ปกครอง`, 'success');

                } else {

                let totalPercent = 0, hasPercent = false, totalManual = 0;
                sections.forEach(s => {

                     s.groups?.forEach(g => {
                        if (!includeHidden && g.published === false) return;
                        g.columns?.forEach(c => {

                             if (c.type === 'percent') { totalPercent += parseFloat(c.max || 100); hasPercent = true; } 
                             else if (c.type === 'manual' || c.type === 'check') { totalManual += parseFloat(c.max || 0); }
                        });
                     });
                });
                return Math.ceil(hasPercent ? totalPercent : totalManual);
            };

            const calculateAutoScore = (s, g, c, includeHidden = false) => {
                if (!g.columns) return '-';
                let total = 0, max = 0;
                g.columns.filter(cl => (cl.type === 'manual' || cl.type === 'check') && (includeHidden || cl.published !== false)).forEach(cl => {
                    let v = s.scores?.[cl.id];
                    let pVal = cl.type === 'check' ? (v ? parseFloat(cl.max || 0) : 0) : parseFloat(v || 0);
                    total += pVal; max += parseFloat(cl.max || 0);

                if (c.type === 'sum') return Math.ceil(total);
                if (c.type === 'percent') return max === 0 ? 0 : Math.ceil((total / max) * (c.max || 100));
                return '-';
            };

                try {
                    const worker = await Tesseract.createWorker('eng');

                                                                    <div className="font-bold text-lg">{g}</div>
                                                                    <input type="number" className="w-full text-center border mt-1 py-1 rounded" value={(courseConfig.grading || DEFAULT_GRADING)[g]} onChange={e => { const newG = {...(courseConfig.grading||DEFAULT_GRADING), [g]:parseFloat(e.target.value)}; setCourseConfig({...courseConfig, grading:newG}); saveCourseConfigData(null, newG, null, null); }}/>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                                {settingSubTab === 'structure' && (
                                                    <div className="space-y-4">
                                                        <button onClick={() => { const newSecs = [...sections, { id: 's'+Date.now(), title: '', groups: [] }]; setSections(newSecs); saveCourseConfigData(newSecs, null, null, null); }} className="bg-slate-800 text-white px-4 py-2 rounded-xl font-bold">+ เพิ่มหมวดหมู่ (Section)</button>
                                                        {sections.map((sec, sIdx) => (
                                                            <div key={sec.id} className="bg-white border rounded-2xl p-4">
                                                                <div className="flex gap-2 mb-4"><input className="font-bold text-lg border-b outline-none flex-1" value={sec.title} placeholder="ชื่อหมวด" onChange={e => { const n = [...sections]; n[sIdx].title = e.target.value; setSections(n); saveCourseConfigData(n, null, null, null); }} /><button onClick={() => { const n = [...sections]; n[sIdx].groups.push({ id: Date.now(), title: '', columns: [] }); setSections(n); saveCourseConfigData(n, null, null, null); }} className="bg-primary-50 text-primary-600 px-3 py-1 rounded-lg text-xs font-bold">+ กลุ่มย่อย</button></div>
                                                                {sec.groups?.map((grp, gIdx) => (
                                                                    <div key={grp.id} className="border-l-4 border-primary-300 bg-slate-50 p-3 mb-2 rounded-r-xl">
                                                                        <div className="flex gap-2 mb-2"><input className="text-sm font-bold bg-transparent outline-none flex-1" value={grp.title} placeholder="ชื่อกลุ่ม" onChange={e => { const n = [...sections]; n[sIdx].groups[gIdx].title = e.target.value; setSections(n); saveCourseConfigData(n, null, null, null); }} /><button onClick={() => { const n = [...sections]; n[sIdx].groups[gIdx].columns.push({ id: 'c'+Date.now(), name: '', max: 10, type: 'manual' }); setSections(n); saveCourseConfigData(n, null, null, null); }} className="bg-white text-xs px-2 py-1 rounded border shadow-sm">+ ช่องคะแนน</button></div>
                                                                        <div className="flex gap-2 overflow-x-auto">
                                                                            {grp.columns?.map((col, cIdx) => (
                                                                                <div key={col.id} className="bg-white border p-2 rounded-lg w-32 shrink-0">
                                                                                    <input className="w-full text-xs font-bold mb-1" value={col.name} placeholder="ชื่อช่อง" onChange={e => { const n = [...sections]; n[sIdx].groups[gIdx].columns[cIdx].name = e.target.value; setSections(n); saveCourseConfigData(n, null, null, null); }}/>
                                                                                    <div className="flex items-center gap-1 text-[10px]"><span className="text-slate-400">Max</span><input className="w-10 border rounded px-1" value={col.max} onChange={e => { const n = [...sections]; n[sIdx].groups[gIdx].columns[cIdx].max = e.target.value; setSections(n); saveCourseConfigData(n, null, null, null); }}/></div>
                                                                                </div>
                                                                            ))}
                                                                        </div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                                {settingSubTab === 'data' && (
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <div className="bg-white p-6 rounded-2xl border text-center"><h3 className="font-bold mb-2">สำรองข้อมูล</h3><button onClick={handleBackup} className="bg-slate-800 text-white w-full py-2 rounded-xl">Backup .JSON</button></div>
                                                        <div className="bg-white p-6 rounded-2xl border text-center"><h3 className="font-bold mb-2 text-red-600">ลบข้อมูลรายวิชา</h3><button onClick={handleClearData} className="border-2 border-red-200 text-red-600 hover:bg-red-50 w-full py-2 rounded-xl">Clear Data</button></div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                </div>
                            </main>
                        </>
                    )}

                    {view === 'homeroom_workspace' && (
                        <div className="min-h-screen bg-slate-50 pb-10">
                            <TopNav />
                            <main className="max-w-[96%] mx-auto mt-8 px-4 animate-fade-in">
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                                    <h2 className="text-2xl font-bold font-display mb-4">สรุปผลการเรียน ห้อง {loggedUser.homeroom}</h2>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-sm border-collapse">
                                            <thead><tr className="bg-slate-100"><th className="p-2 border">ที่</th><th className="p-2 border">รหัส</th><th className="p-2 border">ชื่อ</th>{homeroomData.courses.map(c=><th key={c.id} className="p-2 border text-center text-xs">{c.code}</th>)}</tr></thead>
                                            <tbody>{homeroomData.students.map(s=>(<tr key={s.id} className="hover:bg-slate-50"><td className="p-2 border">{s.no}</td><td className="p-2 border">{s.id}</td><td className="p-2 border">{s.name}</td>{homeroomData.courses.map(c=><td key={c.id} className="p-2 border text-center font-bold">{s.grades[c.id]}</td>)}</tr>))}</tbody>
                                        </table>
                                    </div>
                                </div>
                            </main>
                        </div>
                    )}

                    {/* --- Modals for App Level --- */}
                    <Modal isOpen={ocrModal} title="สแกนใบลงคะแนนด้วย AI (OCR)" onClose={() => setOcrModal(false)}>
                        <div className="text-center p-6 border-2 border-dashed rounded-xl bg-slate-50">
                            {ocrLoading ? <div className="animate-pulse font-bold text-primary-600">{ocrProgress}</div> : <label className="cursor-pointer font-bold text-primary-600">คลิกอัปโหลดรูปภาพ <input type="file" className="hidden" onChange={handleSmartOcrImage}/></label>}
                        </div>
                    </Modal>

                    <Modal isOpen={idCardModal} title="สร้างบัตรนักเรียน" onClose={() => setIdCardModal(false)}>
                        <div className="space-y-4">
                            <select className="w-full p-2 border rounded-xl" value={idCardCourseId} onChange={e=>setIdCardCourseId(e.target.value)}><option value="" disabled hidden>เลือกรายวิชา</option>{visibleCourses.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select>
                            <button onClick={()=>handlePrintIDCard(idCardStudents)} disabled={idCardStudents.length===0} className="w-full py-3 bg-slate-800 text-white rounded-xl font-bold disabled:bg-slate-300"><Icons.Print className="inline mr-2"/> พิมพ์บัตรทั้งหมด</button>
                        </div>
                    </Modal>

                    <Modal isOpen={modal?.type === 'import'} title="นำเข้านักเรียน (CSV)" onClose={() => setModal(null)}>
                        <div className="space-y-4">
                            <button onClick={handleDownloadTemplate} className="w-full py-2 border-2 border-primary-500 text-primary-600 rounded-xl font-bold">ดาวน์โหลด Template</button>
                            <label className="w-full py-3 bg-primary-600 text-white rounded-xl font-bold flex justify-center cursor-pointer">{isImporting ? 'กำลังนำเข้า...' : 'เลือกไฟล์ .CSV'}<input type="file" accept=".csv" className="hidden" onChange={handleFileImport}/></label>
                        </div>
                    </Modal>

                    <Modal isOpen={modal?.type === 'student_edit'} title="แก้ไขนักเรียน" onClose={() => setModal(null)} footer={<button onClick={() => { if(!modal.data.id || !modal.data.name) return showToast('กรอกข้อมูลให้ครบ', 'error'); updateStudent(modal.data); setModal(null); }} className="px-4 py-2 bg-primary-600 text-white rounded-xl font-bold">บันทึก</button>}> 
                        <div className="space-y-3">
                            <input className="w-full p-2 border rounded-xl" placeholder="รหัส" value={modal?.data?.id||''} onChange={e=>setModal({...modal, data:{...modal.data, id:e.target.value}})} disabled={!!modal?.data?.scores} />
                            <input className="w-full p-2 border rounded-xl" placeholder="ชื่อ-นามสกุล" value={modal?.data?.name||''} onChange={e=>setModal({...modal, data:{...modal.data, name:e.target.value}})} />
                            <div className="flex gap-2"><input className="w-full p-2 border rounded-xl" placeholder="ห้อง" value={modal?.data?.room||''} onChange={e=>setModal({...modal, data:{...modal.data, room:e.target.value}})} /><input className="w-24 p-2 border rounded-xl text-center" placeholder="เลขที่" type="number" value={modal?.data?.no||''} onChange={e=>setModal({...modal, data:{...modal.data, no:e.target.value}})} /></div>
                        </div> 
                    </Modal>

                    <Modal isOpen={modal?.type === 'course_edit'} title="จัดการรายวิชา" onClose={() => setModal(null)} footer={<button onClick={() => { if(!modal.data.code || !modal.data.name) return showToast('กรอกรหัสและชื่อวิชา', 'error'); let newC = [...(masterData.courses||[])]; const idx = newC.findIndex(c=>c.id===modal.data.id); if(idx>=0) newC[idx]=modal.data; else newC.push(modal.data); setMasterData({...masterData, courses:newC}); saveMasterData({...masterData, courses:newC}); setModal(null); showToast('บันทึกวิชาเรียบร้อย', 'success'); }} className="px-4 py-2 bg-primary-600 text-white rounded-xl font-bold">บันทึก</button>}> 
                        <div className="space-y-3">
                            <input className="w-full p-2 border rounded-xl" placeholder="รหัสวิชา" value={modal?.data?.code||''} onChange={e=>setModal({...modal, data:{...modal.data, code:e.target.value}})} />
                            <input className="w-full p-2 border rounded-xl" placeholder="ชื่อรายวิชา" value={modal?.data?.name||''} onChange={e=>setModal({...modal, data:{...modal.data, name:e.target.value}})} />
                            <div className="flex gap-2"><input className="w-1/2 p-2 border rounded-xl" placeholder="เทอม" type="number" value={modal?.data?.semester||''} onChange={e=>setModal({...modal, data:{...modal.data, semester:e.target.value}})} /><input className="w-1/2 p-2 border rounded-xl" placeholder="ปีการศึกษา" type="number" value={modal?.data?.year||''} onChange={e=>setModal({...modal, data:{...modal.data, year:e.target.value}})} /></div>
                            {loggedUser?.role === 'admin' && <select className="w-full p-2 border rounded-xl" value={modal?.data?.teacherId||''} onChange={e=>setModal({...modal, data:{...modal.data, teacherId:e.target.value}})}><option value="">-- เลือกผู้สอน --</option>{masterData.users?.filter(u=>u.role==='teacher').map(t=><option key={t.id} value={t.id}>{t.name}</option>)}</select>}
                        </div> 
                    </Modal>

                    <Modal isOpen={modal?.type === 'confirm'} title={modal?.title} onClose={() => setModal(null)} footer={<><button onClick={()=>setModal(null)} className="px-4 py-2 text-slate-500 font-bold">ยกเลิก</button><button onClick={modal?.onConfirm} className="px-4 py-2 bg-red-500 text-white rounded-lg font-bold">ยืนยัน</button></>}>
                        <p className="text-slate-600">{modal?.message}</p>
                    </Modal>
                    
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
